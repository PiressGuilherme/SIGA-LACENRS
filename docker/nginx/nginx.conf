upstream django_backend {
    server backend:8000;
}

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name siga.lacen.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name siga.lacen.local;

    # Certificados gerados com mkcert
    # Gere com: mkcert siga.lacen.local
    # Copie os arquivos para docker/nginx/certs/
    ssl_certificate     /etc/nginx/certs/siga.lacen.local.pem;
    ssl_certificate_key /etc/nginx/certs/siga.lacen.local-key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Segurança
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    client_max_body_size 20M;  # Upload de planilhas e PDFs

    # Arquivos estáticos servidos diretamente pelo Nginx
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Arquivos de mídia (uploads)
    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
    }

    # Todo o restante vai para o Django
    location / {
        proxy_pass http://django_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
