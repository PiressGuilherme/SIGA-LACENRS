{% load django_vite %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SIGA-LACEN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
  {% vite_hmr_client %}
  {% vite_react_refresh %}
  {% vite_asset 'entries/login.jsx' %}
</head>
<body>
  <!--
    IMPORTANTE: data-csrf="{{ csrf_token }}" é obrigatório.
    O React Login.jsx extrai este token e o envia no header X-CSRFToken.
    Sem isso, POST /api/auth/login/ retorna 403 Forbidden.
    Alternativa: extrair do cookie csrftoken (veja entries/login.jsx).
  -->
  <div
    id="login-app"
    data-csrf="{{ csrf_token }}"
    data-next="{{ request.GET.next|default:'/' }}"
  ></div>
</body>
</html>
